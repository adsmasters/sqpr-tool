<!DOCTYPE html>
<html lang="de" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQPR Tool — ASIN-Analyse</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <style>
        :root {
            --bg-primary: #ffffff; --bg-secondary: #f6f8fa; --bg-hover: #eef1f5;
            --border: #d0d7de; --text-primary: #1f2328; --text-secondary: #656d76;
            --text-muted: #8b949e; --accent: #3551FF; --accent-hover: #2a41cc;
            --error: #cf222e; --success: #1a7f37; --row-border: #d8dee4;
            --modal-overlay: rgba(0,0,0,0.3); --placeholder: #8b949e;
        }
        [data-theme="dark"] {
            --bg-primary: #0d1117; --bg-secondary: #161b22; --bg-hover: #1c2129;
            --border: #30363d; --text-primary: #e6edf3; --text-secondary: #8b949e;
            --text-muted: #8b949e; --accent: #3551FF; --accent-hover: #2a44dd;
            --error: #f85149; --success: #3fb950; --row-border: #21262d;
            --modal-overlay: rgba(0,0,0,0.6); --placeholder: #484f58;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; }

        .topbar { background: var(--bg-secondary); border-bottom: 1px solid var(--border); padding: 0 32px; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
        .topbar-left { display: flex; align-items: center; gap: 32px; }
        .topbar-logo { font-size: 18px; font-weight: 700; color: var(--accent); text-decoration: none; }
        .topbar-nav { display: flex; gap: 4px; }
        .topbar-nav a { color: var(--text-secondary); text-decoration: none; font-size: 14px; padding: 8px 14px; border-radius: 6px; transition: color .2s, background .2s; }
        .topbar-nav a:hover { color: var(--text-primary); background: var(--bg-hover); }
        .topbar-nav a.active { color: var(--text-primary); background: var(--bg-hover); }
        .topbar-right { display: flex; align-items: center; gap: 10px; }
        .btn-theme-toggle { background: transparent; border: 1px solid var(--border); color: var(--text-secondary); width: 34px; height: 34px; border-radius: 6px; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; }
        .logout-btn { background: transparent; border: 1px solid var(--border); color: var(--text-secondary); padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
        .logout-btn:hover { color: var(--text-primary); border-color: var(--text-secondary); }

        .main { max-width: 1200px; margin: 0 auto; padding: 32px 24px; }
        .page-header { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
        .page-header h1 { font-size: 24px; font-weight: 700; }
        .client-badge { font-size: 13px; color: var(--text-secondary); background: var(--bg-secondary); padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border); }

        .controls { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 24px; }
        .period-select { background: var(--bg-primary); border: 1px solid var(--border); color: var(--text-primary); padding: 7px 12px; border-radius: 6px; font-size: 13px; cursor: pointer; min-width: 220px; }

        /* KPI row */
        .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 24px; }
        .kpi-card { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
        .kpi-val { font-size: 26px; font-weight: 700; color: var(--text-primary); }
        .kpi-label { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }

        /* ASIN table */
        .section { background: var(--bg-primary); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 24px; }
        .section-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
        .section-title { font-size: 15px; font-weight: 700; }
        .section-sub { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        thead th { background: var(--bg-secondary); padding: 10px 14px; text-align: right; font-weight: 600; font-size: 12px; color: var(--text-secondary); border-bottom: 1px solid var(--border); white-space: nowrap; cursor: pointer; user-select: none; }
        thead th:first-child { text-align: left; }
        thead th.sorted { color: var(--text-primary); }
        tbody tr { border-bottom: 1px solid var(--row-border); transition: background .1s; cursor: pointer; }
        tbody tr:last-child { border-bottom: none; }
        tbody tr:hover { background: var(--bg-hover); }
        tbody tr.expanded { background: var(--bg-hover); }
        td { padding: 10px 14px; text-align: right; }
        td:first-child { text-align: left; font-weight: 500; }
        .asin-code { font-family: monospace; font-size: 12px; color: var(--text-secondary); }
        .sku-label { font-size: 11px; color: var(--text-muted); }

        /* Expand row */
        .expand-row td { padding: 0; background: var(--bg-secondary); }
        .expand-inner { padding: 16px 20px; border-top: 1px solid var(--border); }
        .expand-inner table { background: var(--bg-primary); border-radius: 8px; overflow: hidden; }
        .expand-inner thead th { font-size: 11px; }
        .expand-inner td { font-size: 12px; padding: 7px 12px; }

        /* Search & Filter */
        .search-input { background: var(--bg-primary); border: 1px solid var(--border); color: var(--text-primary); padding: 7px 12px; border-radius: 6px; font-size: 13px; width: 220px; }
        .search-input:focus { outline: none; border-color: var(--accent); }
        .search-input::placeholder { color: var(--placeholder); }

        /* Sort icon */
        .sort-icon { font-size: 10px; margin-left: 2px; }

        /* Badge */
        .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
        .badge-blue { background: #3452ff1a; color: #3452ff; }
        .badge-green { background: #1a7f371a; color: var(--success); }
        .badge-grey { background: var(--bg-hover); color: var(--text-secondary); }

        /* Empty / loading */
        .empty-state { padding: 48px 24px; text-align: center; color: var(--text-secondary); }
        .empty-state h2 { font-size: 18px; margin-bottom: 8px; }
        .loading { display: flex; align-items: center; gap: 12px; padding: 32px 24px; color: var(--text-secondary); }
        .spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* CSV button */
        .btn-csv { background: linear-gradient(135deg, #0332e8 0%, #3452ff 100%); color: #fff; border: none; padding: 7px 16px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; }
        .btn-csv:hover { opacity: .88; }

        /* STR terms list in expand */
        .term-pill { display: inline-block; background: var(--bg-primary); border: 1px solid var(--border); border-radius: 4px; padding: 2px 8px; font-size: 11px; margin: 2px; }

        /* No PPC section */
        .gap-section { background: #f85149 0a; border: 1px solid #f851491a; border-radius: 8px; padding: 12px 16px; margin-top: 12px; }
        .gap-title { font-size: 12px; font-weight: 700; color: var(--error); margin-bottom: 8px; }

        /* Chevron */
        .chevron { font-size: 12px; color: var(--text-muted); margin-left: auto; transition: transform .2s; }
        tr.expanded .chevron { transform: rotate(180deg); }

        /* Tab strip on top of ASIN table */
        .tab-strip { display: flex; gap: 0; border-bottom: 1px solid var(--border); padding: 0 20px; }
        .tab-btn { padding: 10px 18px; font-size: 13px; font-weight: 600; color: var(--text-secondary); background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; transition: color .15s; margin-bottom: -1px; }
        .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
        .tab-btn:hover { color: var(--text-primary); }

        /* Gap checkboxes */
        tr.gap-row-checked { background: #3452ff0d !important; }
        .gap-action-bar { display:flex; align-items:center; gap:10px; flex-wrap:wrap; background:var(--bg-secondary); border:1px solid var(--border); border-radius:8px; padding:10px 14px; margin-bottom:10px; }
        .btn-bulksheet { background:linear-gradient(135deg,#1a7f37 0%,#2da44e 100%); color:#fff; border:none; border-radius:6px; font-weight:600; cursor:pointer; }
        .btn-bulksheet:hover { opacity:.88; }

        /* Bulk Sheet Modal */
        .bs-overlay { position:fixed; inset:0; background:var(--modal-overlay); z-index:1000; display:flex; align-items:center; justify-content:center; }
        .bs-modal { background:var(--bg-primary); border:1px solid var(--border); border-radius:12px; padding:28px 32px; width:500px; max-width:95vw; max-height:90vh; overflow-y:auto; }
        .bs-modal h2 { font-size:18px; font-weight:700; margin-bottom:20px; }
        .bs-field { margin-bottom:14px; }
        .bs-field label { display:block; font-size:12px; font-weight:600; color:var(--text-secondary); margin-bottom:5px; text-transform:uppercase; letter-spacing:.05em; }
        .bs-field input[type=text], .bs-field input[type=number] { width:100%; background:var(--bg-primary); border:1px solid var(--border); color:var(--text-primary); padding:8px 12px; border-radius:6px; font-size:13px; }
        .bs-toggle { display:flex; gap:0; border:1px solid var(--border); border-radius:6px; overflow:hidden; margin-bottom:14px; }
        .bs-toggle button { flex:1; padding:8px; font-size:13px; font-weight:600; background:transparent; border:none; cursor:pointer; color:var(--text-secondary); }
        .bs-toggle button.active { background:var(--accent); color:#fff; }
        .bs-match-types { display:flex; gap:12px; flex-wrap:wrap; }
        .bs-match-types label { display:flex; align-items:center; gap:6px; font-size:13px; cursor:pointer; }
        .bs-actions { display:flex; gap:10px; margin-top:20px; justify-content:flex-end; }
        .bs-btn-cancel { background:transparent; border:1px solid var(--border); color:var(--text-secondary); padding:8px 18px; border-radius:6px; cursor:pointer; font-size:13px; }
        .bs-btn-csv { background:var(--bg-secondary); border:1px solid var(--border); color:var(--text-primary); padding:8px 18px; border-radius:6px; cursor:pointer; font-size:13px; font-weight:600; }
        .bs-btn-xlsx { background:linear-gradient(135deg,#0332e8 0%,#3452ff 100%); color:#fff; border:none; padding:8px 18px; border-radius:6px; cursor:pointer; font-size:13px; font-weight:600; }
        .bs-info { font-size:12px; color:var(--text-secondary); background:var(--bg-secondary); border-radius:6px; padding:8px 12px; margin-bottom:14px; }
    </style>
</head>
<body>
<div class="topbar">
    <div class="topbar-left">
        <a href="dashboard.html" class="topbar-logo">SQPR Tool</a>
        <nav class="topbar-nav">
            <a href="dashboard.html">Marken-Analyse</a>
            <a href="asin.html" class="active">ASIN-Analyse</a>
            <a href="clients.html">Kunden</a>
            <a href="upload.html">Upload</a>
            <a href="help.html">Hilfe</a>
        </nav>
    </div>
    <div class="topbar-right">
        <button class="btn-theme-toggle" id="themeToggle" title="Theme wechseln" onclick="toggleTheme()">☽</button>
        <button class="logout-btn" id="logoutBtn">Logout</button>
    </div>
</div>

<div class="main" id="app">
    <div class="loading"><div class="spinner"></div><div>Wird geladen…</div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script>
    const saved = localStorage.getItem('sqpr_theme') || 'light';
    document.documentElement.setAttribute('data-theme', saved);
    function toggleTheme() {
        const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('sqpr_theme', next);
    }
    if (sessionStorage.getItem('sqpr_auth') !== 'true') window.location.href = 'index.html';

    const SUPABASE_URL = 'https://lgrnmiszhhahfcmctmwo.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_E5tO2TvBrU8f1s5djnVOOQ_vk1djyAI';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    document.getElementById('logoutBtn').addEventListener('click', () => {
        sessionStorage.removeItem('sqpr_auth');
        localStorage.removeItem('sqpr_active_client');
        window.location.href = 'index.html';
    });

    // State
    let client = null;
    let bulkReports = [];
    let selectedBulkId = null;
    let allBulkRows = [];
    let asinData = [];
    let sortCol = 'spend';
    let sortDir = 'desc';
    let searchTerm = '';
    let expandedAsin = null;
    let activeTab = 'terms';
    // ASIN-SQPR state: map of asin -> Set of search_query strings
    let asinSqprMap = {}; // { [asin]: { terms: Set<string>, report: {id, date_start, date_end} } }
    let asinSqprReports = []; // all sqpr_asin_reports for this client

    const fmtInt = (v) => (v || 0).toLocaleString('de-DE');
    const fmtEur = (v) => (v || 0).toLocaleString('de-DE', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' €';
    const fmtPct = (v) => v != null ? v.toFixed(1) + ' %' : '—';
    const esc = (s) => String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

    async function init() {
        const app = document.getElementById('app');
        const clientId = localStorage.getItem('sqpr_active_client');
        if (!clientId) {
            app.innerHTML = '<div class="empty-state"><h2>Bitte wähle einen Kunden aus</h2><p><a href="clients.html">Zur Kundenübersicht →</a></p></div>';
            return;
        }
        const { data: clientData } = await sb.from('sqpr_clients').select('*').eq('id', clientId).single();
        if (!clientData) {
            app.innerHTML = '<div class="empty-state"><h2>Kunde nicht gefunden</h2></div>';
            return;
        }
        client = clientData;

        // Load bulk reports + ASIN-SQPR reports in parallel
        const [bulkRes, asinSqprRes] = await Promise.all([
            sb.from('sqpr_bulk_reports').select('*').eq('client_id', clientId).order('report_date_start', { ascending: false }),
            sb.from('sqpr_asin_reports').select('*').eq('client_id', clientId).order('report_date_start', { ascending: false })
        ]);
        bulkReports    = bulkRes.data || [];
        asinSqprReports = asinSqprRes.data || [];

        if (bulkReports.length === 0) {
            app.innerHTML = `<div class="empty-state"><h2>Keine Bulk Sheet Uploads für ${esc(client.name)}</h2><p>Lade zuerst einen Bulk Sheet hoch: <a href="upload.html">Upload →</a></p></div>`;
            return;
        }

        selectedBulkId = bulkReports[0].id;
        await loadBulkRows();
        render();
    }

    async function loadBulkRows() {
        if (!selectedBulkId) return;
        let all = [], from = 0, batchSize = 1000;
        while (true) {
            const { data, error } = await sb.from('sqpr_bulk_rows').select('*').eq('bulk_report_id', selectedBulkId).range(from, from + batchSize - 1);
            if (error || !data || data.length === 0) break;
            all = all.concat(data);
            if (data.length < batchSize) break;
            from += batchSize;
        }
        allBulkRows = all;

        // Aggregate per ASIN
        const map = {};
        for (const r of all) {
            const key = r.asin || r.sku || 'Unbekannt';
            if (!map[key]) map[key] = { asin: r.asin || '', sku: r.sku || '', impressions: 0, clicks: 0, spend: 0, orders: 0, sales: 0, term_count: 0, terms: [] };
            const m = map[key];
            m.impressions += (r.impressions || 0); m.clicks += (r.clicks || 0);
            m.spend += (r.spend || 0); m.orders += (r.orders || 0); m.sales += (r.sales || 0);
            m.term_count++; m.terms.push(r);
        }
        asinData = Object.values(map);

        // Load ASIN-SQPR data for all ASINs that have reports
        await loadAsinSqprData();
    }

    async function loadAsinSqprData() {
        asinSqprMap = {};
        if (!asinSqprReports || asinSqprReports.length === 0) return;

        // For each ASIN that has a sqpr_asin_report, load its rows
        const reportIds = asinSqprReports.map(r => r.id);
        if (reportIds.length === 0) return;

        let all = [], from = 0, batchSize = 1000;
        // Load in chunks of 20 report IDs at a time to avoid URL length issues
        for (let i = 0; i < reportIds.length; i += 20) {
            const chunk = reportIds.slice(i, i + 20);
            let f = 0;
            while (true) {
                const { data, error } = await sb.from('sqpr_asin_rows').select('asin_report_id, asin, search_query, search_query_volume, purchases_brand, purchases_brand_share')
                    .in('asin_report_id', chunk).range(f, f + batchSize - 1);
                if (error || !data || data.length === 0) break;
                all = all.concat(data);
                if (data.length < batchSize) break;
                f += batchSize;
            }
        }

        // Build map: asin -> {terms: Set<string>, rows: [{search_query, volume, purchases_brand, share}]}
        for (const row of all) {
            const asin = row.asin;
            if (!asinSqprMap[asin]) {
                const rep = asinSqprReports.find(r => r.id === row.asin_report_id);
                asinSqprMap[asin] = { terms: new Set(), rows: [], report: rep };
            }
            if (row.search_query) {
                asinSqprMap[asin].terms.add(row.search_query.toLowerCase().trim());
                asinSqprMap[asin].rows.push(row);
            }
        }
    }

    function applyFilterAndSort() {
        let rows = [...asinData];
        if (searchTerm) {
            const lower = searchTerm.toLowerCase();
            rows = rows.filter(r => r.asin.toLowerCase().includes(lower) || r.sku.toLowerCase().includes(lower));
        }
        rows.sort((a, b) => {
            const av = a[sortCol] ?? 0, bv = b[sortCol] ?? 0;
            return sortDir === 'desc' ? bv - av : av - bv;
        });
        return rows;
    }

    function fmtDate(d) {
        if (!d) return '';
        return new Date(d).toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' });
    }

    function buildAsinRow(row, isExpanded) {
        const hasSqpr = !!asinSqprMap[row.asin];
        const sqprInfo = hasSqpr ? asinSqprMap[row.asin] : null;
        const coveredAds = new Set(row.terms.map(t => t.search_term.toLowerCase().trim()));
        const gapCount = hasSqpr ? [...sqprInfo.terms].filter(t => !coveredAds.has(t)).length : null;
        const ctr  = row.clicks && row.impressions ? (row.clicks / row.impressions * 100).toFixed(2) + ' %' : '—';
        const cvr  = row.orders && row.clicks ? (row.orders / row.clicks * 100).toFixed(1) + ' %' : '—';
        const acos = row.spend && row.sales ? (row.spend / row.sales * 100).toFixed(1) + ' %' : '—';
        const gapBadge = hasSqpr
            ? (gapCount > 0
                ? `<span style="font-size:11px;background:#f851491a;color:#f85149;padding:2px 7px;border-radius:10px;font-weight:600;">⚠ ${gapCount} PPC-Lücken</span>`
                : `<span style="font-size:11px;background:#1a7f371a;color:#1a7f37;padding:2px 7px;border-radius:10px;font-weight:600;">✓ PPC vollständig</span>`)
            : `<span style="font-size:11px;background:var(--bg-hover);color:var(--text-muted);padding:2px 7px;border-radius:10px;">Kein SQPR</span>`;
        return `<tr class="${isExpanded ? 'expanded' : ''}" data-asin="${esc(row.asin)}">
            <td><div class="asin-code">${esc(row.asin)}</div><div class="sku-label">SKU: ${esc(row.sku)}</div></td>
            <td>${fmtInt(row.term_count)}</td>
            <td>${fmtInt(row.impressions)}</td>
            <td>${fmtInt(row.clicks)}</td>
            <td>${ctr}</td>
            <td>${fmtInt(row.orders)}</td>
            <td>${cvr}</td>
            <td>${fmtEur(row.spend)}</td>
            <td>${acos}</td>
            <td style="text-align:right;">${gapBadge}</td>
            <td><span class="chevron">▼</span></td>
        </tr>`;
    }

    function render() {
        const app = document.getElementById('app');
        const totalSpend  = asinData.reduce((s, r) => s + r.spend, 0);
        const totalOrders = asinData.reduce((s, r) => s + r.orders, 0);
        const totalImpr   = asinData.reduce((s, r) => s + r.impressions, 0);
        const totalAsins  = asinData.length;
        const asinsWithSqpr = Object.keys(asinSqprMap).length;

        const periodOptions = bulkReports.map(r =>
            `<option value="${r.id}" ${r.id === selectedBulkId ? 'selected' : ''}>${fmtDate(r.report_date_start)} — ${fmtDate(r.report_date_end)}</option>`
        ).join('');

        const thCol = (label, col) => {
            const active = sortCol === col;
            const icon = active ? (sortDir === 'desc' ? ' ▼' : ' ▲') : '';
            return `<th data-col="${col}" class="${active ? 'sorted' : ''}">${esc(label)}<span class="sort-icon">${icon}</span></th>`;
        };

        const filteredRows = applyFilterAndSort();
        let tableRows = '';
        for (const row of filteredRows) {
            const isExpanded = expandedAsin === row.asin;
            tableRows += buildAsinRow(row, isExpanded);
            if (isExpanded) tableRows += `<tr class="expand-row"><td colspan="11">${buildExpandContent(row)}</td></tr>`;
        }

        const sqprNotice = asinsWithSqpr === 0
            ? `<div style="font-size:12px;color:var(--text-secondary);padding:8px 0;">Noch kein ASIN-SQPR hochgeladen — <a href="upload.html" style="color:var(--accent);">jetzt hochladen</a> um PPC-Lücken zu sehen.</div>`
            : `<div style="font-size:12px;color:var(--text-secondary);padding:8px 0;">${asinsWithSqpr} von ${totalAsins} ASINs haben SQPR-Daten. <a href="upload.html" style="color:var(--accent);">Weitere hochladen →</a></div>`;

        app.innerHTML = `
        <div class="page-header">
            <h1>ASIN-Analyse</h1>
            <span class="client-badge">${esc(client.name)}</span>
        </div>
        <div class="controls">
            <label style="font-size:13px;color:var(--text-secondary);">Bulk Sheet:</label>
            <select class="period-select" id="periodSelect">${periodOptions}</select>
            <a href="upload.html" style="font-size:13px;color:var(--accent);text-decoration:none;">+ Hochladen</a>
        </div>
        <div class="kpi-row">
            <div class="kpi-card"><div class="kpi-val">${fmtInt(totalAsins)}</div><div class="kpi-label">ASINs mit Ads</div></div>
            <div class="kpi-card"><div class="kpi-val">${fmtInt(asinsWithSqpr)}</div><div class="kpi-label">ASINs mit SQPR</div></div>
            <div class="kpi-card"><div class="kpi-val">${fmtInt(totalImpr)}</div><div class="kpi-label">Impressionen</div></div>
            <div class="kpi-card"><div class="kpi-val">${fmtInt(totalOrders)}</div><div class="kpi-label">Orders</div></div>
            <div class="kpi-card"><div class="kpi-val">${fmtEur(totalSpend)}</div><div class="kpi-label">Spend</div></div>
        </div>
        <div class="section">
            <div class="section-header">
                <div>
                    <div class="section-title">ASINs — Übersicht</div>
                    <div class="section-sub">Klick auf eine Zeile → alle Search Terms + PPC-Lücken dieser ASIN</div>
                </div>
                <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
                    ${sqprNotice}
                    <input type="text" class="search-input" id="asinSearch" placeholder="ASIN oder SKU filtern…" value="${esc(searchTerm)}">
                    <button class="btn-csv" id="csvExportBtn">⬇ CSV</button>
                </div>
            </div>
            <div style="overflow-x:auto;">
                <table id="asinTable">
                    <thead><tr>
                        ${thCol('ASIN / SKU', 'asin')}
                        ${thCol('Ad Terms', 'term_count')}
                        ${thCol('Impressionen', 'impressions')}
                        ${thCol('Klicks', 'clicks')}
                        <th>CTR</th>
                        ${thCol('Orders', 'orders')}
                        <th>CVR</th>
                        ${thCol('Spend', 'spend')}
                        <th>ACOS</th>
                        <th>SQPR-Status</th>
                        <th></th>
                    </tr></thead>
                    <tbody id="asinBody">${tableRows}</tbody>
                </table>
            </div>
        </div>`;

        document.getElementById('periodSelect').addEventListener('change', async function() {
            selectedBulkId = this.value;
            expandedAsin = null;
            app.innerHTML = '<div class="loading"><div class="spinner"></div><div>Wird geladen…</div></div>';
            await loadBulkRows();
            render();
        });
        document.getElementById('asinSearch').addEventListener('input', function() { searchTerm = this.value; renderTableOnly(); });
        document.getElementById('csvExportBtn').addEventListener('click', exportCsv);
        bindTableEvents();
    }

    // Per-ASIN gap selection state: { [asin]: Set<search_query> }
    const gapChecked = {};

    function getGapRows(row) {
        const sqprData = asinSqprMap[row.asin];
        if (!sqprData) return [];
        const coveredAds = new Set(row.terms.map(t => t.search_term.toLowerCase().trim()));
        return sqprData.rows
            .filter(r => !coveredAds.has((r.search_query || '').toLowerCase().trim()))
            .sort((a, b) => (b.search_query_volume || 0) - (a.search_query_volume || 0));
    }

    function buildExpandContent(row) {
        const terms = [...row.terms].sort((a, b) => (b.spend || 0) - (a.spend || 0));
        const sqprData = asinSqprMap[row.asin];
        const hasGapData = !!sqprData;
        const isTerms = activeTab === 'terms';
        const isGaps  = activeTab === 'gaps';

        let gapHtml = '';
        if (hasGapData) {
            const gapRows = getGapRows(row);
            const repInfo = sqprData.report
                ? `<span style="font-size:11px;color:var(--text-muted);">SQPR-Zeitraum: ${fmtDate(sqprData.report.report_date_start)} – ${fmtDate(sqprData.report.report_date_end)}</span>`
                : '';

            if (gapRows.length > 0) {
                if (!gapChecked[row.asin]) gapChecked[row.asin] = new Set();
                const checked = gapChecked[row.asin];
                const allChecked = gapRows.length > 0 && gapRows.every(r => checked.has(r.search_query));

                const gapTableRows = gapRows.slice(0, 200).map(r => {
                    const isChk = checked.has(r.search_query);
                    return `<tr class="${isChk ? 'gap-row-checked' : ''}">
                        <td style="width:32px;text-align:center;"><input type="checkbox" class="gap-chk" data-asin="${esc(row.asin)}" data-term="${esc(r.search_query)}" ${isChk ? 'checked' : ''}></td>
                        <td style="text-align:left;max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${esc(r.search_query)}">${esc(r.search_query)}</td>
                        <td>${fmtInt(r.search_query_volume)}</td>
                        <td>${r.purchases_brand_share != null ? r.purchases_brand_share.toFixed(1) + ' %' : '—'}</td>
                    </tr>`;
                }).join('');

                const checkedCount = checked.size;
                const actionBar = checkedCount > 0 ? `
                <div class="gap-action-bar">
                    <span style="font-size:13px;font-weight:600;">${checkedCount} Begriff${checkedCount !== 1 ? 'e' : ''} ausgewählt</span>
                    <button class="btn-csv" style="font-size:12px;padding:5px 14px;" data-export-gaps="${esc(row.asin)}">⬇ CSV</button>
                    <button class="btn-bulksheet" style="font-size:12px;padding:5px 14px;" data-bulksheet-asin="${esc(row.asin)}" data-bulksheet-sku="${esc(row.sku || '')}">📄 Bulk Sheet erstellen</button>
                    <button class="btn-clear-gaps" style="font-size:12px;padding:5px 10px;background:transparent;border:1px solid var(--border);color:var(--text-secondary);border-radius:6px;cursor:pointer;" data-asin="${esc(row.asin)}">✕ Auswahl löschen</button>
                </div>` : '';

                gapHtml = `
                <div style="margin-bottom:8px;display:flex;align-items:center;gap:12px;">${repInfo}</div>
                <div style="font-size:13px;font-weight:600;color:var(--error);margin-bottom:8px;">🔴 ${gapRows.length} relevante Suchbegriffe ohne PPC-Abdeckung</div>
                ${actionBar}
                <div style="overflow-x:auto;">
                    <table>
                        <thead><tr>
                            <th style="width:32px;text-align:center;"><input type="checkbox" class="gap-chk-all" data-asin="${esc(row.asin)}" ${allChecked ? 'checked' : ''} title="Alle auswählen"></th>
                            <th style="text-align:left;">Suchbegriff</th>
                            <th>Suchvolumen</th>
                            <th>Purchase Share (Marke)</th>
                        </tr></thead>
                        <tbody>${gapTableRows}</tbody>
                    </table>
                </div>
                ${gapRows.length > 200 ? `<div style="padding:8px;font-size:12px;color:var(--text-secondary);">Zeige 200 von ${gapRows.length}. CSV für vollständige Liste.</div>` : ''}
                <div style="margin-top:10px;">
                    <button class="btn-csv" style="font-size:12px;padding:5px 12px;" data-export-gaps="${esc(row.asin)}">⬇ Alle Lücken als CSV</button>
                </div>`;
            } else {
                gapHtml = `<div style="padding:12px 0;font-size:13px;color:var(--success);">✅ Alle relevanten Suchbegriffe dieser ASIN sind im PPC-Setup abgedeckt.</div>`;
            }
        } else {
            gapHtml = `<div style="padding:12px 0;font-size:13px;color:var(--text-secondary);">
                Kein ASIN-SQPR für <strong>${esc(row.asin)}</strong> hochgeladen.<br>
                <a href="upload.html" style="color:var(--accent);">Jetzt hochladen →</a> (Brand Analytics → Search Query Performance → ASIN auswählen → CSV herunterladen)
            </div>`;
        }

        const termRows = terms.slice(0, 200).map(t => {
            const acos = t.spend && t.sales ? (t.spend / t.sales * 100).toFixed(1) + ' %' : '—';
            return `<tr>
                <td style="text-align:left;max-width:320px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${esc(t.search_term)}">${esc(t.search_term)}</td>
                <td>${esc(t.match_type || '—')}</td>
                <td>${fmtInt(t.impressions)}</td>
                <td>${fmtInt(t.clicks)}</td>
                <td>${fmtInt(t.orders)}</td>
                <td>${fmtEur(t.spend)}</td>
                <td>${acos}</td>
            </tr>`;
        }).join('');

        return `<div class="expand-inner">
            <div class="tab-strip">
                <button class="tab-btn ${isTerms ? 'active' : ''}" data-tab="terms" data-asin="${esc(row.asin)}">
                    Aktive Search Terms (${terms.length})
                </button>
                ${hasGapData ? `<button class="tab-btn ${isGaps ? 'active' : ''}" data-tab="gaps" data-asin="${esc(row.asin)}">
                    PPC-Lücken
                </button>` : ''}
                <button class="btn-csv" style="margin-left:auto;font-size:12px;padding:5px 12px;" data-export-asin="${esc(row.asin)}">⬇ CSV</button>
            </div>

            ${isTerms ? `
            <div style="overflow-x:auto;margin-top:12px;">
                <table>
                    <thead><tr>
                        <th style="text-align:left;">Suchbegriff</th>
                        <th>Match Type</th>
                        <th>Impr.</th>
                        <th>Klicks</th>
                        <th>Orders</th>
                        <th>Spend</th>
                        <th>ACOS</th>
                    </tr></thead>
                    <tbody>${termRows}</tbody>
                </table>
                ${terms.length > 200 ? `<div style="padding:8px 12px;font-size:12px;color:var(--text-secondary);">Zeige 200 von ${terms.length} Begriffen. CSV exportieren für vollständige Liste.</div>` : ''}
            </div>` : ''}

            ${isGaps ? gapHtml : ''}
        </div>`;
    }

    function renderTableOnly() {
        const filteredRows = applyFilterAndSort();
        const tbody = document.getElementById('asinBody');
        if (!tbody) return;
        let html = '';
        for (const row of filteredRows) {
            const isExpanded = expandedAsin === row.asin;
            html += buildAsinRow(row, isExpanded);
            if (isExpanded) html += `<tr class="expand-row"><td colspan="11">${buildExpandContent(row)}</td></tr>`;
        }
        tbody.innerHTML = html;
        bindTableEvents();
    }

    function bindTableEvents() {
        const tbody = document.getElementById('asinBody');
        if (!tbody) return;

        document.querySelectorAll('#asinTable thead th[data-col]').forEach(th => {
            th.addEventListener('click', function() {
                const col = this.dataset.col;
                if (sortCol === col) sortDir = sortDir === 'asc' ? 'desc' : 'asc';
                else { sortCol = col; sortDir = 'desc'; }
                renderTableOnly();
            });
            if (th.dataset.col === sortCol) {
                th.classList.add('sorted');
                const icon = th.querySelector('.sort-icon');
                if (icon) icon.textContent = sortDir === 'desc' ? ' ▼' : ' ▲';
            }
        });

        tbody.querySelectorAll('tr[data-asin]').forEach(tr => {
            tr.addEventListener('click', function(e) {
                if (e.target.closest('.tab-btn') || e.target.closest('[data-export-asin]') || e.target.closest('[data-export-gaps]')) return;
                const asin = this.dataset.asin;
                expandedAsin = expandedAsin === asin ? null : asin;
                activeTab = 'terms';
                renderTableOnly();
            });
        });

        tbody.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', function(e) {
                e.stopPropagation();
                activeTab = this.dataset.tab;
                renderTableOnly();
            });
        });

        tbody.querySelectorAll('[data-export-asin]').forEach(btn => {
            btn.addEventListener('click', function(e) {
                e.stopPropagation();
                exportAsinCsv(this.dataset.exportAsin);
            });
        });

        tbody.querySelectorAll('[data-export-gaps]').forEach(btn => {
            btn.addEventListener('click', function(e) {
                e.stopPropagation();
                exportGapsCsv(this.dataset.exportGaps);
            });
        });

        // Single gap checkbox
        tbody.querySelectorAll('.gap-chk').forEach(chk => {
            chk.addEventListener('change', function(e) {
                e.stopPropagation();
                const asin = this.dataset.asin;
                const term = this.dataset.term;
                if (!gapChecked[asin]) gapChecked[asin] = new Set();
                if (this.checked) gapChecked[asin].add(term);
                else gapChecked[asin].delete(term);
                renderTableOnly();
            });
        });

        // Select-all gap checkbox
        tbody.querySelectorAll('.gap-chk-all').forEach(chk => {
            chk.addEventListener('change', function(e) {
                e.stopPropagation();
                const asin = this.dataset.asin;
                const asinRow = asinData.find(r => r.asin === asin);
                if (!asinRow) return;
                const gapRows = getGapRows(asinRow);
                if (!gapChecked[asin]) gapChecked[asin] = new Set();
                if (this.checked) gapRows.forEach(r => gapChecked[asin].add(r.search_query));
                else gapChecked[asin].clear();
                renderTableOnly();
            });
        });

        // Clear selection
        tbody.querySelectorAll('.btn-clear-gaps').forEach(btn => {
            btn.addEventListener('click', function(e) {
                e.stopPropagation();
                const asin = this.dataset.asin;
                if (gapChecked[asin]) gapChecked[asin].clear();
                renderTableOnly();
            });
        });

        // Open Bulk Sheet modal
        tbody.querySelectorAll('[data-bulksheet-asin]').forEach(btn => {
            btn.addEventListener('click', function(e) {
                e.stopPropagation();
                openBulkSheetModal(this.dataset.bulksheetAsin, this.dataset.bulksheetSku);
            });
        });
    }

    function exportGapsCsv(asin) {
        const sqprData = asinSqprMap[asin];
        if (!sqprData) return;
        const asinRow = asinData.find(r => r.asin === asin);
        const coveredAds = new Set((asinRow ? asinRow.terms : []).map(t => t.search_term.toLowerCase().trim()));
        const gapRows = sqprData.rows
            .filter(r => !coveredAds.has((r.search_query || '').toLowerCase().trim()))
            .sort((a, b) => (b.search_query_volume || 0) - (a.search_query_volume || 0));
        const rows = [['Suchbegriff', 'Suchvolumen', 'Purchase Share (Marke)']];
        for (const r of gapRows) {
            rows.push([r.search_query, r.search_query_volume || 0,
                r.purchases_brand_share != null ? r.purchases_brand_share.toFixed(2) + '%' : '']);
        }
        downloadCsv(rows, `gaps_${asin}.csv`);
    }

    function exportCsv() {
        const rows = [['ASIN', 'SKU', 'Search Terms', 'Impressionen', 'Klicks', 'Orders', 'Spend', 'Sales']];
        for (const r of applyFilterAndSort()) {
            rows.push([r.asin, r.sku, r.term_count, r.impressions, r.clicks, r.orders, r.spend.toFixed(2), r.sales.toFixed(2)]);
        }
        downloadCsv(rows, 'asin_overview.csv');
    }

    function exportAsinCsv(asin) {
        const asinRow = asinData.find(r => r.asin === asin);
        if (!asinRow) return;
        const rows = [['ASIN', 'SKU', 'Suchbegriff', 'Match Type', 'Kampagne', 'Ad Group', 'Impressionen', 'Klicks', 'Orders', 'Spend', 'Sales', 'ACOS']];
        for (const t of asinRow.terms) {
            const acos = t.spend && t.sales ? (t.spend / t.sales * 100).toFixed(1) : '';
            rows.push([t.asin, t.sku, t.search_term, t.match_type || '', t.campaign_name || '', t.ad_group_name || '', t.impressions, t.clicks, t.orders, (t.spend || 0).toFixed(2), (t.sales || 0).toFixed(2), acos]);
        }
        downloadCsv(rows, `asin_${asin}_terms.csv`);
    }

    function downloadCsv(rows, filename) {
        const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g, '""')}"`).join(',')).join('\n');
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = filename; a.click();
        URL.revokeObjectURL(url);
    }

    // ── Bulk Sheet Modal ──────────────────────────────────────────────
    function openBulkSheetModal(asin, sku) {
        const checked = gapChecked[asin];
        if (!checked || checked.size === 0) return;
        const asinRow = asinData.find(r => r.asin === asin);
        const gapRows = asinRow ? getGapRows(asinRow) : [];
        const selectedTerms = gapRows.filter(r => checked.has(r.search_query));

        // Remove any existing modal
        document.getElementById('bsOverlay')?.remove();

        const overlay = document.createElement('div');
        overlay.className = 'bs-overlay';
        overlay.id = 'bsOverlay';
        overlay.innerHTML = `
        <div class="bs-modal">
            <h2>📄 Bulk Sheet erstellen</h2>
            <div class="bs-info">${selectedTerms.length} Keywords ausgewählt für ASIN <strong>${esc(asin)}</strong>${sku ? ` / SKU <strong>${esc(sku)}</strong>` : ''}</div>

            <div class="bs-field">
                <label>Kontotyp</label>
                <div class="bs-toggle">
                    <button id="bsTypeSeller" class="active" onclick="setBsType('seller')">Seller (SKU)</button>
                    <button id="bsTypeVendor" onclick="setBsType('vendor')">Vendor (ASIN)</button>
                </div>
            </div>

            <div class="bs-field" id="bsSkuField">
                <label>SKU</label>
                <input type="text" id="bsSkuInput" value="${esc(sku || '')}" placeholder="z.B. MY-SKU-001">
            </div>
            <div class="bs-field" id="bsAsinField" style="display:none;">
                <label>ASIN</label>
                <input type="text" id="bsAsinInput" value="${esc(asin)}" placeholder="z.B. B09XYZ1234">
            </div>

            <div class="bs-field">
                <label>Kampagnenname</label>
                <input type="text" id="bsCampName" placeholder="z.B. SP_Generic_Exact_${esc(asin)}">
            </div>
            <div class="bs-field">
                <label>Ad Group Name</label>
                <input type="text" id="bsAdGroup" placeholder="z.B. AG_${esc(asin)}" value="AG_${esc(asin)}">
            </div>
            <div class="bs-field">
                <label>Match Types</label>
                <div class="bs-match-types">
                    <label><input type="checkbox" id="bsExact" checked> Exact</label>
                    <label><input type="checkbox" id="bsPhrase"> Phrase</label>
                    <label><input type="checkbox" id="bsBroad"> Broad</label>
                </div>
            </div>
            <div class="bs-field">
                <label>Default Bid (€)</label>
                <input type="number" id="bsBid" value="0.50" step="0.01" min="0.02">
            </div>

            <div class="bs-actions">
                <button class="bs-btn-cancel" onclick="closeBsModal()">Abbrechen</button>
                <button class="bs-btn-csv" onclick="downloadBsAsCsv('${esc(asin)}')">⬇ CSV (einfach)</button>
                <button class="bs-btn-xlsx" onclick="downloadBsAsXlsx('${esc(asin)}')">📄 Bulk Sheet (.xlsx)</button>
            </div>
        </div>`;
        document.body.appendChild(overlay);
        overlay.addEventListener('click', e => { if (e.target === overlay) closeBsModal(); });
    }

    function closeBsModal() { document.getElementById('bsOverlay')?.remove(); }

    let bsType = 'seller';
    function setBsType(type) {
        bsType = type;
        document.getElementById('bsTypeSeller').classList.toggle('active', type === 'seller');
        document.getElementById('bsTypeVendor').classList.toggle('active', type === 'vendor');
        document.getElementById('bsSkuField').style.display = type === 'seller' ? '' : 'none';
        document.getElementById('bsAsinField').style.display = type === 'vendor' ? '' : 'none';
    }

    function getBsConfig(asin) {
        const campName = document.getElementById('bsCampName').value.trim() || `SP_Gap_${asin}`;
        const adGroup  = document.getElementById('bsAdGroup').value.trim() || `AG_${asin}`;
        const bid      = parseFloat(document.getElementById('bsBid').value) || 0.50;
        const matchTypes = [];
        if (document.getElementById('bsExact').checked)  matchTypes.push('exact');
        if (document.getElementById('bsPhrase').checked) matchTypes.push('phrase');
        if (document.getElementById('bsBroad').checked)  matchTypes.push('broad');
        const productId = bsType === 'seller'
            ? document.getElementById('bsSkuInput').value.trim()
            : document.getElementById('bsAsinInput').value.trim();
        return { campName, adGroup, bid, matchTypes, productId, isVendor: bsType === 'vendor' };
    }

    function downloadBsAsCsv(asin) {
        const checked = gapChecked[asin];
        const asinRow = asinData.find(r => r.asin === asin);
        const gapRows = asinRow ? getGapRows(asinRow) : [];
        const terms = gapRows.filter(r => checked && checked.has(r.search_query)).map(r => r.search_query);
        const { campName, adGroup, bid, matchTypes } = getBsConfig(asin);
        const rows = [['Kampagne', 'Ad Group', 'Keyword', 'Match Type', 'Bid']];
        for (const term of terms) {
            for (const mt of matchTypes.length ? matchTypes : ['exact']) {
                rows.push([campName, adGroup, term, mt, bid.toFixed(2)]);
            }
        }
        downloadCsv(rows, `bulk_keywords_${asin}.csv`);
        closeBsModal();
    }

    function downloadBsAsXlsx(asin) {
        if (typeof XLSX === 'undefined') { alert('SheetJS nicht geladen. Bitte Seite neu laden.'); return; }
        const checked = gapChecked[asin];
        const asinRow = asinData.find(r => r.asin === asin);
        const gapRows = asinRow ? getGapRows(asinRow) : [];
        const terms = gapRows.filter(r => checked && checked.has(r.search_query)).map(r => r.search_query);
        const { campName, adGroup, bid, matchTypes, productId, isVendor } = getBsConfig(asin);

        const HEADERS = ['Product','Entity','Operation','Campaign ID','Ad Group ID','Portfolio ID','Ad ID','Keyword ID','Product Targeting ID','Campaign Name','Ad Group Name','Start Date','End Date','Targeting Type','State','Daily Budget','SKU','ASIN','Ad Group Default Bid','Bid','Keyword Text','Match Type','Bidding Strategy','Placement','Percentage','Product Targeting Expression','Site Restrictions'];
        const emptyRow = () => { const r = {}; HEADERS.forEach(h => r[h] = ''); return r; };

        const rows = [];

        // One campaign block per match type
        rows.length = 0; // reset, rebuild per match type
        for (const mt of matchTypes.length ? matchTypes : ['exact']) {
            const mtLabel = mt.charAt(0).toUpperCase() + mt.slice(1);
            const campNameMt = `${campName}_${mtLabel}`;
            const adGroupMt  = `${adGroup}_${mtLabel}`;

            const c = emptyRow();
            c['Product'] = 'Sponsored Products'; c['Entity'] = 'Campaign'; c['Operation'] = 'create';
            c['Campaign ID'] = campNameMt; c['Campaign Name'] = campNameMt;
            c['Targeting Type'] = 'Manual'; c['State'] = 'enabled';
            c['Daily Budget'] = '10'; c['Bidding Strategy'] = 'Dynamic bids - down only';
            rows.push(c);

            const ag2 = emptyRow();
            ag2['Product'] = 'Sponsored Products'; ag2['Entity'] = 'Ad Group'; ag2['Operation'] = 'create';
            ag2['Campaign ID'] = campNameMt; ag2['Ad Group ID'] = adGroupMt;
            ag2['Ad Group Name'] = adGroupMt; ag2['State'] = 'enabled';
            ag2['Ad Group Default Bid'] = bid.toFixed(2);
            rows.push(ag2);

            const pa2 = emptyRow();
            pa2['Product'] = 'Sponsored Products'; pa2['Entity'] = 'Product Ad'; pa2['Operation'] = 'create';
            pa2['Campaign ID'] = campNameMt; pa2['Ad Group ID'] = adGroupMt; pa2['State'] = 'enabled';
            if (isVendor) pa2['ASIN'] = productId; else pa2['SKU'] = productId;
            rows.push(pa2);

            for (const term of terms) {
                const kw = emptyRow();
                kw['Product'] = 'Sponsored Products'; kw['Entity'] = 'Keyword'; kw['Operation'] = 'create';
                kw['Campaign ID'] = campNameMt; kw['Ad Group ID'] = adGroupMt;
                kw['State'] = 'enabled'; kw['Keyword Text'] = term;
                kw['Match Type'] = mt; kw['Bid'] = bid.toFixed(2);
                rows.push(kw);
            }
        }

        const sheetData = [HEADERS, ...rows.map(r => HEADERS.map(h => r[h]))];
        const ws = XLSX.utils.aoa_to_sheet(sheetData);
        ws['!cols'] = HEADERS.map(() => ({ wch: 22 }));
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'Sponsored Products');
        const today = new Date();
        const ds = today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0') + '-' + String(today.getDate()).padStart(2,'0');
        XLSX.writeFile(wb, `Bulk-Upload_${asin}_${ds}.xlsx`);
        closeBsModal();
    }

    init();
</script>
