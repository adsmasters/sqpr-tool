<!DOCTYPE html>
<html lang="de" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQPR Tool — Login</title>
    <style>
        /* Theme variables — Light (default) */
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f6f8fa;
            --bg-hover: #eef1f5;
            --border: #d0d7de;
            --text-primary: #1f2328;
            --text-secondary: #656d76;
            --text-muted: #8b949e;
            --accent: #3551FF;
            --accent-hover: #2a41cc;
            --error: #cf222e;
            --success: #1a7f37;
            --placeholder: #8b949e;
        }

        /* Dark mode */
        [data-theme="dark"] {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-hover: #1c2129;
            --border: #30363d;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --text-muted: #8b949e;
            --accent: #3551FF;
            --accent-hover: #2a44dd;
            --error: #f85149;
            --success: #3fb950;
            --placeholder: #484f58;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, color 0.2s;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 0 20px;
        }

        .login-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 48px 40px;
            text-align: center;
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 36px;
        }

        .form-group {
            margin-bottom: 24px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 15px;
            font-family: Arial, sans-serif;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            border-color: var(--accent);
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            font-family: Arial, sans-serif;
            cursor: pointer;
            transition: background 0.2s;
        }

        .login-btn:hover {
            background: var(--accent-hover);
        }

        .error-msg {
            color: var(--error);
            font-size: 13px;
            margin-top: 16px;
            display: none;
        }

        .agency-tag {
            margin-top: 32px;
            font-size: 12px;
            color: var(--placeholder);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">SQPR Tool</div>
            <div class="subtitle">AdsMasters GmbH — Internes Reporting</div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="password">Passwort</label>
                    <input type="password" id="password" placeholder="Passwort eingeben" autocomplete="current-password" autofocus>
                </div>
                <button type="submit" class="login-btn">Anmelden</button>
                <div class="error-msg" id="errorMsg">Falsches Passwort. Bitte erneut versuchen.</div>
            </form>

            <div class="agency-tag">AdsMasters GmbH</div>
        </div>
    </div>

    <script>
        // Theme init — read saved theme (no toggle on login page)
        (function() {
            const saved = localStorage.getItem('sqpr_theme') || 'light';
            document.documentElement.setAttribute('data-theme', saved);
        })();

        const CORRECT_PASSWORD = 'adsmasters2026';

        if (sessionStorage.getItem('sqpr_auth') === 'true') {
            window.location.href = 'dashboard.html';
        }

        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const pw = document.getElementById('password').value;

            if (pw === CORRECT_PASSWORD) {
                sessionStorage.setItem('sqpr_auth', 'true');
                window.location.href = 'dashboard.html';
            } else {
                const errEl = document.getElementById('errorMsg');
                errEl.style.display = 'block';
                document.getElementById('password').value = '';
                document.getElementById('password').focus();
            }
        });
    </script>
</body>
</html>
