<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQPR Tool — Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #0d1117;
            color: #e6edf3;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 0 20px;
        }

        .login-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 16px;
            padding: 48px 40px;
            text-align: center;
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            color: #3551FF;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 14px;
            color: #8b949e;
            margin-bottom: 36px;
        }

        .form-group {
            margin-bottom: 24px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            color: #8b949e;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            color: #e6edf3;
            font-size: 15px;
            font-family: Arial, sans-serif;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            border-color: #3551FF;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: #3551FF;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            font-family: Arial, sans-serif;
            cursor: pointer;
            transition: background 0.2s;
        }

        .login-btn:hover {
            background: #2a44e0;
        }

        .error-msg {
            color: #f85149;
            font-size: 13px;
            margin-top: 16px;
            display: none;
        }

        .agency-tag {
            margin-top: 32px;
            font-size: 12px;
            color: #484f58;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">SQPR Tool</div>
            <div class="subtitle">AdsMasters GmbH — Internes Reporting</div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="password">Passwort</label>
                    <input type="password" id="password" placeholder="Passwort eingeben" autocomplete="current-password" autofocus>
                </div>
                <button type="submit" class="login-btn">Anmelden</button>
                <div class="error-msg" id="errorMsg">Falsches Passwort. Bitte erneut versuchen.</div>
            </form>

            <div class="agency-tag">AdsMasters GmbH</div>
        </div>
    </div>

    <script>
        const CORRECT_PASSWORD = 'adsmasters2026';

        if (sessionStorage.getItem('sqpr_auth') === 'true') {
            window.location.href = 'dashboard.html';
        }

        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const pw = document.getElementById('password').value;

            if (pw === CORRECT_PASSWORD) {
                sessionStorage.setItem('sqpr_auth', 'true');
                window.location.href = 'dashboard.html';
            } else {
                const errEl = document.getElementById('errorMsg');
                errEl.style.display = 'block';
                document.getElementById('password').value = '';
                document.getElementById('password').focus();
            }
        });
    </script>
</body>
</html>
